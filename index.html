<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    />
    <link rel="stylesheet" href="style.css">
    <title>Loja Digital - Cadastrar</title>
</head>
<body>
    <header>
        <a href="#">
            <img 
                src="./assets/logo.svg" 
                alt="Logo da loja digital"
            />
            <span>
                Loja Digital
            </span>
        </a>
    </header>
    <main>
        <form>
            <div class="title">
                <h1>Acesse sua Conta</h1>
                <p>
                    Novo Cliente? Então registre-se <a href="#">aqui</a>.
                </p>
            </div>
            <div class="inputs">
                <!--div*2>label+input-->
                <div>
                    <label for="">Email *</label>
                    <input 
                        type="email" 
                        placeholder="Insira seu email." 
                    />
                </div>
                <div>
                    <label for="">Senha *</label>
                    <input 
                        type="password" 
                        placeholder="Digite sua senha." 
                    />
                </div>
            </div>
            <p>
                <a href="#">Esqueci mina senha</a>
            </p>
            <button>Acessar Conta</button>
            <div class="others">
                <p>Ou faça login com</p>
                <ul>
                    <li>
                        <a href="#">
                            <img 
                                src="./assets/email.svg" 
                                alt="Ícone para acesso com email"
                            />
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img 
                                src="./assets/facebook.svg" 
                                alt="Ícone para acesso com o facebook"
                            />
                        </a>
                    </li>
                </ul>
            </div>
        </form>
    </main>
    <footer>

    </footer>
</body>
</html>
